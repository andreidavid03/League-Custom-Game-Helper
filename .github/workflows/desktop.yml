name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build and release installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tagName: v__VERSION__
          releaseName: 'LoL Custom Game Helper v__VERSION__'
          releaseBody: |
            ⚔️ Desktop builds — made by David Demon

            **Windows**: download the `.exe` (NSIS installer) or `.msi`
            **Mac**: download the `.dmg` (universal — Intel & Apple Silicon)

            Unsigned builds: on Windows, click "More info → Run anyway" if SmartScreen appears.
            On Mac, right-click the app → Open the first time.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
